        firebase.initializeApp(firebaseConfig);

        function checkAuthState() {
            auth.onAuthStateChanged((user) => {

                if (user) {
                    loginForm.classList.add('hidden');

        function loginAdmin() {

      function sendData() {
    const name = document.getElementById('name').value;
    const arrival = document.getElementById('arrival-date').value;
    const departure = document.getElementById('departure-date').value;
    const selectedActivities = [];
    document.querySelectorAll('input[name="user-activity"]:checked').forEach(cb => {
        selectedActivities.push(cb.value);
    });
    
    if(!name) return alert("Wpisz imię!");

    // Logika walidacji dat:
    // Wyciągamy dzień i miesiąc, np. "26.04" -> dzień 26, miesiąc 04
    const [dayArr, monthArr] = arrival.split('.').map(Number);
    const [dayDep, monthDep] = departure.split('.').map(Number);

    // Tworzymy proste porównanie (miesiąc * 100 + dzień) 
    // np. 1 maja to 400 + 1 = 401, a 30 kwietnia to 300 + 30 = 330
    const valArrival = monthArr * 100 + dayArr;
    const valDeparture = monthDep * 100 + dayDep;

    if (valDeparture < valArrival) {
        alert("Błąd: Data wyjazdu nie może być wcześniejsza niż data przyjazdu!");
        return; // Przerywamy wysyłanie
    }

    // Jeśli wszystko OK, wysyłamy do Firebase
    db.ref('entries/' + name).set({ 
        name: name, 
        arrivalDate: arrival,
        departureDate: departure,
        activities: selectedActivities, // Zapisujemy tablicę wybranych aktywności
        timestamp: Date.now()
    })
    .then(() => {
        alert('Dziękujemy! Zgłoszenie zapisane pomyślnie.');
        document.getElementById('name').value = '';
        document.querySelectorAll('input[name="user-activity"]').forEach(cb => cb.checked = false);
        showSection('home');
    }).catch(err => alert("Błąd bazy: " + err.message));
}

    

function loadData() {
    db.ref('entries').on('value', (snapshot) => {
        const list = document.getElementById('list');
        const statsTotal = document.getElementById('stats-total');
        const statsToday = document.getElementById('stats-today');
        
        list.innerHTML = '';
        
        let countTotal = 0;
        let countMayFirst = 0;

        // Definiujemy zakres dni festiwalu dla wykresu
        const festivalDays = ["26.04", "27.04", "28.04", "29.04", "30.04", "01.05", "02.05", "03.05", "04.05", "05.05", "06.05"];
        let dailyCounts = {};
        festivalDays.forEach(day => dailyCounts[day] = 0);

        if (!snapshot.exists()) {
            list.innerHTML = '<p class="text-gray-400 text-center italic py-4">Brak zarejestrowanych osób</p>';
            if(statsTotal) statsTotal.innerText = "0";
            if(statsToday) statsToday.innerText = "0";
            if(myChart) myChart.destroy(); // Czyścimy wykres jeśli nie ma danych
            return;
        }

        snapshot.forEach(child => {
            const data = child.val();
            const id = child.key;
            const acts = data.activities ? data.activities.join(', ') : 'Brak wybranych aktywności';

            // 1. Logika Statystyk ogólnych
            countTotal++;
            if(data.arrivalDate === "01.05") {
                countMayFirst++;
            }

            // 2. Logika Wykresu (obliczanie obecności w każdym dniu)
            const startIndex = festivalDays.indexOf(data.arrivalDate);
            const endIndex = festivalDays.indexOf(data.departureDate);

            if (startIndex !== -1 && endIndex !== -1) {
                for (let i = startIndex; i <= endIndex; i++) {
                    const currentDay = festivalDays[i];
                    dailyCounts[currentDay]++;
                }
            }

            // 3. Renderowanie Karty Uczestnika na liście
            list.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow group mb-3">
                    <div class="flex flex-col">
                        <span class="text-gray-800 font-bold text-lg leading-tight">${id}</span>
                        <div class="flex items-center mt-1 space-x-2">
                            <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold uppercase tracking-wider">
                                Przyjazd: ${data.arrivalDate || '---'}
                            </span>
                            <span class="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold uppercase tracking-wider">
                                Wyjazd: ${data.departureDate || '---'}
                            </span>
                           <div class="mt-2 text-xs text-green-700 font-medium bg-green-50 p-2 rounded-lg border border-green-100">
                <strong>Aktywności:</strong> ${acts}
            </div> 
                        </div>
                    </div>
                    <button 
                        onclick="deleteEntry('${id}')" 
                        class="bg-white text-red-400 hover:text-red-600 hover:bg-red-50 border border-gray-200 p-2 rounded-lg transition-colors shadow-sm font-bold text-xs"
                    >
                        USUŃ
                    </button>
                </div>
            `;
        });

        // Aktualizacja liczników tekstowych
        if(statsTotal) statsTotal.innerText = countTotal;
        if(statsToday) statsToday.innerText = countMayFirst;

        // Wywołanie rysowania wykresu
        renderChart(festivalDays, Object.values(dailyCounts));

        console.log("Panel zaktualizowany. Łącznie osób:", countTotal);
    });
}

// Funkcja pomocnicza do rysowania wykresu (Chart.js)
function renderChart(labels, dataValues) {
    const canvas = document.getElementById('occupancyChart');
    if (!canvas) return; // Zabezpieczenie jeśli nie ma canvas w HTML
    
    const ctx = canvas.getContext('2d');
    
    if (myChart) {
        myChart.destroy();
    }

    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Osoby na miejscu',
                data: dataValues,
                backgroundColor: 'rgba(34, 197, 94, 0.5)', 
                borderColor: 'rgb(34, 197, 94)',
                borderWidth: 2,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false, // Pozwala lepiej kontrolować wysokość w CSS
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1, color: '#9ca3af' },
                    grid: { color: '#f3f4f6' }
                },
                x: {
                    ticks: { color: '#9ca3af' },
                    grid: { display: false }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
}
        // 1. Ładowanie aktywności do formularza i panelu admina
function listenToActivities() {
    db.ref('settings/activities').on('value', (snapshot) => {
        const formContainer = document.getElementById('activities-container');
        const adminList = document.getElementById('admin-activities-list');
        
        formContainer.innerHTML = '';
        adminList.innerHTML = '';

        if (!snapshot.exists()) {
            formContainer.innerHTML = '<p class="text-xs text-gray-400">Brak zdefiniowanych aktywności.</p>';
            return;
        }

        snapshot.forEach(child => {
            const activity = child.val();
            const activityId = child.key;

            // Dodaj do FORMULARZA (Checkbox)
            formContainer.innerHTML += `
    <label class="flex items-center space-x-2 p-2 bg-gray-800 rounded-lg cursor-pointer hover:bg-gray-700 transition border border-gray-700 text-sm">
        <input type="checkbox" name="user-activity" value="${activity}" class="w-4 h-4 text-green-500 rounded bg-gray-900 border-gray-600">
        <span class="text-gray-200">${activity}</span>
    </label>
`;

            // Dodaj do PANELU ADMINA (Tagi z "x")
            adminList.innerHTML += `
                <span class="bg-white border border-gray-300 px-2 py-1 rounded-md text-xs flex items-center gap-2 font-medium">
                    ${activity}
                    <button onclick="removeActivity('${activityId}')" class="text-red-500 font-bold hover:text-red-700">×</button>
                </span>
            `;
        });
    });
}

// 2. Dodawanie nowej aktywności przez Admina
function addActivity() {
    const input = document.getElementById('new-activity-name');
    const val = input.value.trim();
    if(!val) return;
    
    db.ref('settings/activities').push(val).then(() => {
        input.value = '';
    });
}

// 3. Usuwanie aktywności przez Admina
function removeActivity(id) {
    if(confirm('Usunąć tę aktywność z listy wyboru?')) {
        db.ref('settings/activities/' + id).remove();
    }
}

        // --- KONFIGURACJA POKAZU SLAJDÓW ---

// 1. Lista Twoich zdjęć (muszą być w tym samym folderze co index.html)
const slideshowImages = [
    'bg1.JPG', // Zmień na swoje nazwy plików
    'bg2.JPG',
    'bg3.JPG',
    'bg4.JPG',
    'bg5.JPG',
    'bg6.JPG',
    'bg7.JPG',
    'bg8.JPG',
    'bg9.JPG'
];

// 2. Czas wyświetlania jednego zdjęcia (w milisekundach), np. 5000 = 5 sekund
const slideDuration = 5000; 

let currentSlideIndex = 0;
let slides = [];

// Funkcja inicjalizująca pokaz slajdów
function initSlideshow() {
    const container = document.getElementById('slideshow-container');
    if (!container || slideshowImages.length === 0) return;

    // Tworzymy elementy HTML dla każdego zdjęcia
    slideshowImages.forEach((imgUrl, index) => {
        const slideDiv = document.createElement('div');
        slideDiv.className = 'slide';
        slideDiv.style.backgroundImage = `url('${imgUrl}')`;
        
        // Pierwsze zdjęcie ustawiamy jako aktywne od razu
        if (index === 0) slideDiv.classList.add('active');
        
        container.appendChild(slideDiv);
        slides.push(slideDiv);
    });

    // Uruchamiamy cykl przełączania, jeśli jest więcej niż 1 zdjęcie
    if (slides.length > 1) {
        setInterval(nextSlide, slideDuration);
    }
}

// Funkcja przełączająca na następne zdjęcie
function nextSlide() {
    // Usuwamy klasę 'active' z obecnego slajdu
    slides[currentSlideIndex].classList.remove('active');

    // Obliczamy indeks następnego slajdu (z zapętleniem)
    currentSlideIndex = (currentSlideIndex + 1) % slides.length;

    // Dodajemy klasę 'active' do nowego slajdu (zadziała transition CSS)
    slides[currentSlideIndex].classList.add('active');
}

// --- URUCHOMIENIE ---
// Wywołujemy inicjalizację po załadowaniu DOM
document.addEventListener('DOMContentLoaded', () => {
    // Zachowaj swoje inne wywołania, np. listenToActivities();
    initSlideshow(); 
});
        listenToActivities();
