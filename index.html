<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majówka 2026 - System Zgłoszeń</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; background-color: black; }
        .hidden { display: none !important; }

        /* POKAZ SLAJDÓW W TLE */
        #slideshow-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-color: #000;
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active { opacity: 1; z-index: 1; }

        /* FILTR PRZYCIEMNIAJĄCY */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 5;
            pointer-events: none;
        }

        /* TREŚĆ NAD TŁEM */
        .content-wrapper { position: relative; z-index: 10; }
        
        /* Przezroczyste karty */
        .glass-card {
            background-color: rgba(17, 24, 39, 0.7) !important;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen text-white relative">
    
    <div id="slideshow-container"></div>
    <div class="bg-overlay"></div>

    <div class="content-wrapper">
        <nav class="bg-black/30 backdrop-blur-md shadow-sm p-4 mb-8">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold text-green-400 tracking-tight cursor-pointer" onclick="showSection('home')">Majówka 2026</h1>
                <div class="space-x-4">
                    <button onclick="showSection('home')" class="text-gray-200 hover:text-green-400 font-medium">Główna</button>
                    <button onclick="showSection('admin-section')" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-black transition border border-gray-700">Nie wchodź!</button>
                </div>
            </div>
        </nav>

        <div class="max-w-2xl mx-auto px-4 pb-12">
            
            <div id="home" class="flex flex-col items-center justify-center text-center py-20">
                <h2 class="text-6xl font-extrabold text-white mb-6 tracking-tight drop-shadow-lg">HEJKA KOCHANI!</h2>
                <p class="text-white text-xl mb-10 opacity-90">Zapraszam na majóweczkę. <br> Zarejestruj się i wypełnij formularz :*</p>
                <button onclick="showSection('form-section')" class="bg-white text-blue-700 px-12 py-5 rounded-full font-bold text-xl hover:scale-105 transition-transform shadow-2xl">
                    Otwórz formularz zgłoszeń
                </button>
            </div>

            <div id="form-section" class="hidden">
                <div class="glass-card p-8 rounded-3xl shadow-2xl">
                    <h2 class="text-3xl font-bold mb-6 text-green-400">Formularz zgłoszeniowy</h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">Imię i Nazwisko</label>
                            <input type="text" id="name" class="w-full p-4 bg-gray-900/50 border border-gray-700 rounded-2xl text-white focus:ring-2 focus:ring-green-500 outline-none" placeholder="np. Jan Paweł II">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-1">Przyjazd</label>
                                <select id="arrival-date" class="w-full p-4 bg-gray-900/50 border border-gray-700 rounded-2xl text-white outline-none">
                                    <option value="26.04">26 kwietnia</option>
                                    <option value="27.04">27 kwietnia</option>
                                    <option value="28.04">28 kwietnia</option>
                                    <option value="29.04">29 kwietnia</option>
                                    <option value="30.04">30 kwietnia</option>
                                    <option value="01.05">01 maja</option>
                                    <option value="02.05">02 maja</option>
                                    <option value="03.05">03 maja</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-1">Wyjazd</label>
                                <select id="departure-date" class="w-full p-4 bg-gray-900/50 border border-gray-700 rounded-2xl text-white outline-none">
                                    <option value="26.04">26 kwietnia</option>
                                    <option value="06.05">06 maja</option>
                                    </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2 font-bold italic">Aktywności:</label>
                            <div id="activities-container" class="grid grid-cols-2 gap-2"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">Propozycje</label>
                            <textarea id="user-proposals" rows="3" class="w-full p-4 bg-gray-900/50 border border-gray-700 rounded-2xl text-white outline-none" placeholder="Twoje pomysły..."></textarea>
                        </div>
                        <button onclick="sendData()" class="w-full bg-green-600 hover:bg-green-500 text-white py-5 rounded-2xl font-bold text-lg transition shadow-lg">Wyślij zgłoszenie</button>
                        <button onclick="showSection('home')" class="w-full text-gray-400 text-sm py-2">Wróć</button>
                    </div>
                </div>
            </div>

          <div id="admin-section" class="hidden">
    <div class="glass-card p-8 rounded-3xl shadow-2xl max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-400">🔐 Panel Adasia. Mowiłem, dla Pana to.</h2>
        
        <div id="admin-login-form" class="space-y-4">
            <div class="flex justify-center mb-6">
                <img src="bg10.JPG" alt="Admin" class="w-40 h-40 object-cover rounded-2xl border-2 border-gray-700 shadow-2xl">
            </div>
            <input type="email" id="admin-email" class="w-full p-4 bg-gray-900/50 border border-gray-700 rounded-2xl text-white outline-none" placeholder="Email">
            <input type="password" id="admin-pass" class="w-full p-4 bg-gray-900/50 border border-gray-700 rounded-2xl text-white outline-none" placeholder="Hasło">
            <button onclick="loginAdmin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold transition">Zaloguj się</button>
        </div>

        <div id="admin-content" class="hidden space-y-8">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                <h3 class="text-sm font-bold text-gray-400 uppercase mb-4 tracking-wider">Zarządzaj Aktywnościami</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="new-activity-name" class="flex-1 p-3 bg-gray-900/50 border border-gray-700 rounded-xl text-sm" placeholder="Nowa aktywność (np. Planszówki)">
                    <button onclick="addActivity()" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-xl text-xs font-bold transition">DODAJ</button>
                </div>
                <div id="admin-activities-list" class="flex flex-wrap gap-2">
                    </div>
            </div>

            <div class="bg-white/10 p-4 rounded-2xl">
                <canvas id="occupancyChart" style="height:200px"></canvas>
            </div>

            <div>
                <h3 class="text-lg font-bold mb-4 text-green-400">Lista Uczestników</h3>
                <div id="list" class="space-y-3"></div>
            </div>

            <button onclick="logoutAdmin()" class="w-full py-3 text-red-400 font-bold border border-red-400/20 rounded-xl hover:bg-red-400/10 transition">Wyloguj się</button>
        </div>
        <button onclick="showSection('home')" class="w-full mt-4 text-gray-500 text-sm">Powrót do strony głównej</button>
    </div>
</div>
    <script>
        let myChart = null;
        const firebaseConfig = {
            apiKey: "AIzaSyBfb2ZZVwFJsGisXCJi_NoCztqM9T-3jmo",
            authDomain: "majowka-17460.firebaseapp.com",
            databaseURL: "https://majowka-17460-default-rtdb.firebaseio.com",
            projectId: "majowka-17460",
            storageBucket: "majowka-17460.firebasestorage.app",
            messagingSenderId: "782699449352",
            appId: "1:782699449352:web:bf6f0a0a287ba45b3915bd",
            measurementId: "G-TG5J9SRX0M"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function showSection(id) {
            ['home', 'form-section', 'admin-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'admin-section') checkAuthState();
        }

        function checkAuthState() {
            auth.onAuthStateChanged((user) => {
                document.getElementById('admin-login-form').classList.toggle('hidden', !!user);
                document.getElementById('admin-content').classList.toggle('hidden', !user);
                if (user) loadData();
            });
        }

        function loginAdmin() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        }

        function logoutAdmin() { auth.signOut().then(() => showSection('home')); }

        function sendData() {
            const name = document.getElementById('name').value;
            if(!name) return alert("Wpisz imię!");
            
            const arrival = document.getElementById('arrival-date').value;
            const departure = document.getElementById('departure-date').value;
            const proposals = document.getElementById('user-proposals').value;
            const selectedActivities = Array.from(document.querySelectorAll('input[name="user-activity"]:checked')).map(cb => cb.value);

            db.ref('entries/' + name).set({
                name, arrivalDate: arrival, departureDate: departure, activities: selectedActivities, userProposals: proposals, timestamp: Date.now()
            }).then(() => {
                alert('Zapisano!');
                showSection('home');
            });
        }

        function loadData() {
            db.ref('entries').on('value', (snapshot) => {
                const list = document.getElementById('list');
                list.innerHTML = '';
                const festivalDays = ["26.04", "27.04", "28.04", "29.04", "30.04", "01.05", "02.05", "03.05", "04.05", "05.05", "06.05"];
                let dailyCounts = {}; festivalDays.forEach(d => dailyCounts[d] = 0);

                snapshot.forEach(child => {
                    const data = child.val();
                    const start = festivalDays.indexOf(data.arrivalDate);
                    const end = festivalDays.indexOf(data.departureDate);
                    if(start !== -1 && end !== -1) {
                        for(let i=start; i<=end; i++) dailyCounts[festivalDays[i]]++;
                    }
                   list.innerHTML += `
    <div class="flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/10 mb-2">
        <div>
            <p class="font-bold text-lg">${child.key}</p>
            <p class="text-xs text-gray-400">${data.arrivalDate} - ${data.departureDate}</p>
            <p class="text-[10px] text-green-500 mt-1 italic">${data.activities ? data.activities.join(', ') : 'Brak'}</p>
        </div>
        <button onclick="deleteEntry('${child.key}')" class="bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-3 py-1 rounded-lg text-xs font-bold transition">
            USUŃ
        </button>
    </div>
`;
                });
                renderChart(festivalDays, Object.values(dailyCounts));
            });
        }

        function renderChart(labels, dataValues) {
            const ctx = document.getElementById('occupancyChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{ label: 'Osoby', data: dataValues, backgroundColor: '#22c55e' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
// FUNKCJA USUWANIA WPISU
function deleteEntry(key) {
    if(confirm('Na pewno usunąć zgłoszenie: ' + key + '?')) {
        db.ref('entries/' + key).remove()
            .then(() => alert('Usunięto!'))
            .catch(err => alert('Błąd: ' + err.message));
    }
}

// DODAWANIE NOWEJ AKTYWNOŚCI
function addActivity() {
    const input = document.getElementById('new-activity-name');
    const val = input.value.trim();
    if(!val) return;
    
    db.ref('settings/activities').push(val).then(() => {
        input.value = '';
    });
}

// USUWANIE AKTYWNOŚCI Z LISTY WYBORU
function removeActivity(id) {
    if(confirm('Usunąć tę aktywność z formularza?')) {
        db.ref('settings/activities/' + id).remove();
    }
}
      function listenToActivities() {
    db.ref('settings/activities').on('value', (snapshot) => {
        const container = document.getElementById('activities-container');
        const adminList = document.getElementById('admin-activities-list');
        
        // Czyścimy oba kontenery przed dodaniem nowych danych
        if (container) container.innerHTML = '';
        if (adminList) adminList.innerHTML = '';

        snapshot.forEach(child => {
            const activityName = child.val();
            const activityId = child.key;

            // 1. Dodawanie do formularza zgłoszeń (checkboxy)
            if (container) {
                container.innerHTML += `
                    <label class="flex items-center space-x-2 p-2 bg-gray-800/50 rounded-lg border border-gray-700 text-xs cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" name="user-activity" value="${activityName}" class="accent-green-500">
                        <span>${activityName}</span>
                    </label>`;
            }

            // 2. Dodawanie do panelu admina (tagi z przyciskiem X)
            if (adminList) {
                adminList.innerHTML += `
                    <span class="bg-gray-800 text-white px-3 py-1.5 rounded-full text-xs flex items-center gap-2 border border-gray-600">
                        ${activityName}
                        <button onclick="removeActivity('${activityId}')" 
                                class="text-red-400 hover:text-red-600 font-bold text-lg leading-none ml-1">
                            &times;
                        </button>
                    </span>`;
            }
        });
    });
}

        // --- SLAJDY ---
        const slideshowImages = ['bg1.JPG', 'bg2.JPG', 'bg3.JPG', 'bg4.JPG', 'bg5.JPG', 'bg6.JPG', 'bg7.JPG', 'bg8.JPG', 'bg9.JPG'];
        let currentSlideIndex = 0;
        let slides = [];

        function initSlideshow() {
            const container = document.getElementById('slideshow-container');
            slideshowImages.forEach((url, i) => {
                const div = document.createElement('div');
                div.className = 'slide' + (i === 0 ? ' active' : '');
                div.style.backgroundImage = `url('${url}')`;
                container.appendChild(div);
                slides.push(div);
            });
            if(slides.length > 1) setInterval(nextSlide, 5000);
        }

        function nextSlide() {
            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            slides[currentSlideIndex].classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSlideshow();
            listenToActivities();
        });
    </script>
</body>
</html>
