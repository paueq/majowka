<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majówka 2026 - System Zgłoszeń</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-majowka { background: linear-gradient(135deg, #6ee7b7 0%, #3b82f6 100%); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm p-4 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-green-600 tracking-tight cursor-pointer" onclick="showSection('home')">🌸 Majówka 2026</h1>
            <div class="space-x-4">
                <button onclick="showSection('home')" class="text-gray-600 hover:text-green-600 font-medium">Start</button>
                <button onclick="showSection('admin-section')" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-black transition">Panel Admina</button>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4">
        
        <div id="home" class="text-center py-12">
            <div class="bg-majowka p-10 rounded-3xl shadow-2xl mb-8">
                <h2 class="text-4xl font-bold text-white mb-4">Witaj w systemie!</h2>
                <p class="text-white opacity-90 mb-8 text-lg">Dołącz do uczestników tegorocznej Majówki.</p>
                <button onclick="showSection('form-section')" class="bg-white text-blue-600 px-8 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform shadow-lg">
                    Otwórz formularz
                </button>
            </div>
        </div>

        <div id="form-section" class="hidden">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Formularz zgłoszeniowy</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Imię i Nazwisko</label>
                        <input type="text" id="name" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="np. Jan Kowalski">
                    </div>
                    <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Imię i Nazwisko</label>
    <input type="text" id="name" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="np. Jan Kowalski">
</div>

<div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Kiedy do nas dotrzesz?</label>
    <select id="arrival-date" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none bg-white">
        <option value="26.04">26 kwietnia (Niedziela)</option>
        <option value="27.04">27 kwietnia (Poniedziałek)</option>
        <option value="28.04">28 kwietnia (Wtorek)</option>
        <option value="29.04">29 kwietnia (Środa)</option>
        <option value="30.04">30 kwietnia (Czwartek)</option>
        <option value="01.05">01 maja (Piątek - Majówka!)</option>
        <option value="02.05">02 maja (Sobota)</option>
        <option value="03.05">03 maja (Niedziela)</option>
        <option value="04.05">04 maja (Poniedziałek)</option>
        <option value="05.05">05 maja (Wtorek)</option>
        <option value="06.05">06 maja (Środa)</option>
    </select>
</div>
                    <button onclick="sendData()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition shadow-md">
                        Wyślij zgłoszenie
                    </button>
                    <button onclick="showSection('home')" class="w-full text-gray-400 text-sm italic py-2">Wróć</button>
                </div>
            </div>
        </div>

        <div id="admin-section" class="hidden">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">🔐 Panel Admina</h2>
                <div id="admin-login-form" class="space-y-4">
                    <input type="email" id="admin-email" class="w-full p-3 border rounded-xl" placeholder="Email">
                    <input type="password" id="admin-pass" class="w-full p-3 border rounded-xl" placeholder="Hasło">
                    <button onclick="loginAdmin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Zaloguj się</button>
                </div>
                <div id="admin-content" class="hidden">
                    <div class="flex justify-between items-center mb-6 border-b pb-4">
                        <h3 class="text-lg font-semibold text-gray-700">Zgłoszenia</h3>
                        <button onclick="logoutAdmin()" class="text-red-500 text-xs font-bold border border-red-200 px-2 py-1 rounded hover:bg-red-50">WYLOGUJ</button>
                    </div>
                    <div id="list" class="space-y-3"></div>
                </div>
                <button onclick="showSection('home')" class="w-full mt-6 text-gray-400 text-xs text-center">Powrót</button>
            </div>
        </div>

    </div>

    <script>
       // FUNKCJA PRZEŁĄCZANIA (MUSI BYĆ NA GÓRZE SKRYPTU)
        function showSection(id) {
            console.log("Przełączam na:", id);
            const sections = ['home', 'form-section', 'admin-section'];
            sections.forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if(id === 'admin-section') checkAuthState();
        }

        // TWOJA KONFIGURACJA FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBfb2ZZVwFJsGisXCJi_NoCztqM9T-3jmo",
            authDomain: "majowka-17460.firebaseapp.com",
            databaseURL: "https://majowka-17460-default-rtdb.firebaseio.com",
            projectId: "majowka-17460",
            storageBucket: "majowka-17460.firebasestorage.app",
            messagingSenderId: "782699449352",
            appId: "1:782699449352:web:bf6f0a0a287ba45b3915bd",
            measurementId: "G-TG5J9SRX0M"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function checkAuthState() {
            auth.onAuthStateChanged((user) => {
                const loginForm = document.getElementById('admin-login-form');
                const adminContent = document.getElementById('admin-content');
                if (user) {
                    loginForm.classList.add('hidden');
                    adminContent.classList.remove('hidden');
                    loadData();
                } else {
                    loginForm.classList.remove('hidden');
                    adminContent.classList.add('hidden');
                }
            });
        }

        function loginAdmin() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Błąd: " + err.message));
        }

        function logoutAdmin() { auth.signOut().then(() => showSection('home')); }

       function sendData() {
    const name = document.getElementById('name').value;
    const arrival = document.getElementById('arrival-date').value; // Pobieramy datę
    
    if(!name) return alert("Wpisz imię!");
    
    db.ref('entries/' + name).set({ 
        name: name, 
        arrivalDate: arrival, // Zapisujemy datę w bazie
        timestamp: Date.now() 
    })
    .then(() => {
        alert('Zgłoszenie na dzień ' + arrival + ' zostało wysłane!');
        document.getElementById('name').value = '';
        showSection('home');
    });
}

        function loadData() {
    db.ref('entries').on('value', (snapshot) => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        snapshot.forEach(child => {
            const data = child.val(); // Pobieramy wszystkie dane obiektu
            list.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100 shadow-sm">
                    <div class="flex flex-col">
                        <span class="text-gray-800 font-bold">${child.key}</span>
                        <span class="text-xs text-blue-600 font-medium">Przyjazd: ${data.arrivalDate}</span>
                    </div>
                    <button onclick="deleteEntry('${child.key}')" class="text-red-400 hover:text-red-600 text-xs font-bold px-2 py-1">USUŃ</button>
                </div>`;
        });
    });
}

        function deleteEntry(key) {
            if(confirm('Usunąć ' + key + '?')) db.ref('entries/' + key).remove();
        }
    </script>
</body>
</html>
