<!DOCTYPE html>
<html lang="pl">
<head>
    <title>System Zgłoszeń</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .hidden { display: none; }
        .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="home">
        <h1>Witaj w systemie</h1>
        <button onclick="showSection('form-section')">Formularz zgłoszeniowy</button>
        <button onclick="showSection('admin-section')">Panel Admina</button>
    </div>

    <div id="form-section" class="hidden">
        <h2>Formularz</h2>
        <input type="text" id="name" placeholder="Imię i Nazwisko">
        <button onclick="sendData()">Wyślij</button>
        <button onclick="showSection('home')">Powrót</button>
    </div>

   <div id="admin-section" class="hidden">
    <h2>Panel Admina</h2>
    
    <div id="admin-login-form">
        <input type="email" id="admin-email" placeholder="Email admina">
        <input type="password" id="admin-pass" placeholder="Hasło">
        <button onclick="loginAdmin()">Zaloguj się</button>
    </div>

    <div id="admin-content" class="hidden">
        <button onclick="logoutAdmin()">Wyloguj</button>
        <h3>Wszystkie zgłoszenia</h3>
        <div id="list"></div>
    </div>
    
    <br>
    <button onclick="showSection('home')">Powrót do strony głównej</button>
</div>

    <script>
      // Konfiguracja (upewnij się, że masz tu poprawne dane ze swojej konsoli)
const firebaseConfig = {
  apiKey: "AIzaSyBfb2ZZVwFJsGisXCJi_NoCztqM9T-3jmo",
  authDomain: "majowka-17460.firebaseapp.com",
  databaseURL: "https://majowka-17460-default-rtdb.firebaseio.com",
  projectId: "majowka-17460",
  storageBucket: "majowka-17460.firebasestorage.app",
  messagingSenderId: "782699449352",
  appId: "1:782699449352:web:bf6f0a0a287ba45b3915bd",
  measurementId: "G-TG5J9SRX0M"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth(); // Inicjalizacja modułu logowania

function showSection(id) {
    document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    
    // Jeśli wchodzimy do admina, sprawdzamy czy już jesteśmy zalogowani
    if(id === 'admin-section') {
        checkAuthState();
    }
}

// Funkcja sprawdzająca stan zalogowania
function checkAuthState() {
    auth.onAuthStateChanged((user) => {
        if (user) {
            // Zalogowany - pokaż dane, ukryj login
            document.getElementById('admin-login-form').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            loadData();
        } else {
            // Niezalogowany - pokaż login, ukryj dane
            document.getElementById('admin-login-form').classList.remove('hidden');
            document.getElementById('admin-content').classList.add('hidden');
        }
    });
}

function loginAdmin() {
    const email = document.getElementById('admin-email').value;
    const pass = document.getElementById('admin-pass').value;

    auth.signInWithEmailAndPassword(email, pass)
        .catch(error => alert("Błąd: " + error.message));
}

function logoutAdmin() {
    auth.signOut();
}

// Twoja funkcja zapisu (zmieniamy ID na Imię tak jak chciałeś)
function sendData() {
    const name = document.getElementById('name').value;
    if(!name) return alert("Wpisz imię!");
    
    // Używamy .set() zamiast .push(), aby Imię było kluczem
    db.ref('entries/' + name).set({
        name: name,
        timestamp: Date.now()
    }).then(() => {
        alert('Zgłoszenie wysłane!');
        document.getElementById('name').value = '';
        showSection('home');
    });
}

function loadData() {
    db.ref('entries').on('value', (snapshot) => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        snapshot.forEach(child => {
            list.innerHTML += `<div class="card"><strong>ID:</strong> ${child.key}</div>`;
        });
    });
}
    </script>
</body>
</html>
