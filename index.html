<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majówka 2026 - System Zgłoszeń</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
    body { font-family: 'Inter', sans-serif; }
    .bg-majowka { background: linear-gradient(135deg, #6ee7b7 0%, #3b82f6 100%); }
    .hidden { display: none !important; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm p-4 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-green-600 tracking-tight cursor-pointer" onclick="showSection('home')">🌸 Majówka 2026</h1>
            <div class="space-x-4">
                <button onclick="showSection('home')" class="text-gray-600 hover:text-green-600 font-medium">Start</button>
                <button onclick="showSection('admin-section')" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-black transition">Panel Admina</button>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4">
        
        <div id="home" class="text-center py-12">
            <div class="bg-majowka p-10 rounded-3xl shadow-2xl mb-8">
                <h2 class="text-4xl font-bold text-white mb-4">Witaj w systemie!</h2>
                <p class="text-white opacity-90 mb-8 text-lg">Dołącz do uczestników tegorocznej Majówki. Rejestracja trwa kilka sekund.</p>
                <button onclick="showSection('form-section')" class="bg-white text-blue-600 px-8 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform shadow-lg">
                    Otwórz formularz
                </button>
            </div>
        </div>

        <div id="form-section" class="hidden">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Formularz zgłoszeniowy</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Imię i Nazwisko</label>
                        <input type="text" id="name" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="np. Jan Kowalski">
                    </div>
                    <button onclick="sendData()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition shadow-md">
                        Wyślij zgłoszenie
